name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Build
        run: |
          xcodebuild build \
            -project SuikaDrop/SuikaDrop.xcodeproj \
            -scheme SuikaDrop \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO | xcpretty
      - name: Test
        run: |
          xcodebuild test \
            -project SuikaDrop/SuikaDrop.xcodeproj \
            -scheme SuikaDrop \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO | xcpretty

  swiftlint:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - run: brew install swiftlint
      - run: swiftlint lint --strict SuikaDrop/
